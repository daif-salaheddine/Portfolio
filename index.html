<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Personal portfolio and CV — projects, experience, and contact.">
  <title>Your Name</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IBM+Plex+Sans:wght@300;400;500;600&family=Caveat:wght@500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="scroll-progress" id="scroll-progress" aria-hidden="true"></div>

  <div class="page-loader" id="page-loader">
    <div class="loader__inner">
      <p class="loader__name" id="loader-name"></p>
      <div class="loader__track"><div class="loader__bar" id="loader-bar"></div></div>
    </div>
  </div>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursor-ring"></div>

  <div class="zellige" aria-hidden="true"></div>
  <div class="zellige zellige--2" aria-hidden="true"></div>

  <header class="navbar" id="navbar">
    <div class="navbar__inner">
      <a href="#" class="navbar__logo">
        <span class="navbar__logo-text" id="nav-name">Your Name</span>
      </a>

      <ul class="navbar__links nav" aria-label="Main">
        <li><a href="#about" class="navbar__link">About</a></li>
        <li><a href="#projects" class="navbar__link">Projects</a></li>
        <li><a href="#contact" class="navbar__link">Contact</a></li>
      </ul>

      <div class="navbar__actions">
        <button class="theme-toggle" id="theme-toggle" aria-label="Switch to light mode">
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button class="navbar__burger nav-toggle" aria-label="Toggle menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>

    <nav class="navbar__mobile" id="mobile-nav" hidden>
      <ul>
        <li><a href="#about" class="navbar__mobile-link">About</a></li>
        <li><a href="#projects" class="navbar__mobile-link">Projects</a></li>
        <li><a href="#contact" class="navbar__mobile-link navbar__mobile-cta">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="app">
    <section class="hero" id="top">
      <canvas class="hero__canvas" id="hero-canvas" aria-hidden="true"></canvas>

      <div class="hero__photo-wrap" aria-hidden="true">
        <img class="hero__photo-bg" src="picture.jpg" alt="" id="hero-photo-bg">
        <div class="hero__photo-veil"></div>
      </div>

      <div class="container hero__layout">
        <div class="hero__content">
          <div class="hero__badge" id="hero-badge">
            <span id="hero-status"></span>
          </div>

          <div class="hero__name" aria-label="Salaheddine Daif">
            <span class="hero__name-line" id="hero-firstname">
              <span class="hero__name-inner"></span>
            </span>
            <span class="hero__name-line hero__name-line--gold" id="hero-lastname">
              <span class="hero__name-inner"></span>
            </span>
          </div>

          <p class="hero__role" id="hero-role">CS Student &middot; Full-Stack Developer</p>
          <p class="hero__sub" id="hero-intro"></p>
          <div class="hero__stats" id="hero-stats-row"></div>

          <div class="hero__ctas">
            <a href="#projects" class="hero__btn hero__btn--primary">See my work</a>
            <a href="#contact" class="hero__btn hero__btn--ghost">Get in touch</a>
          </div>

          <div class="hero__scroll" aria-hidden="true">
            <span class="hero__scroll-line"></span>
            Scroll
          </div>
        </div>
      </div>
    </section>

    <div class="marquee-strip" aria-hidden="true">
      <div class="marquee__track" id="marquee-track"></div>
    </div>

    <section class="section about" id="about">
      <div class="container">
        <h2 class="section-title reveal" id="about-title"></h2>

        <div class="about__grid">
          <div class="about__main reveal reveal-delay-2">
            <div class="about__text" id="about-text"></div>
            <div class="about__socials">
              <span class="about__socials-label">Find me on</span>
              <div class="about__socials-row" id="about-socials"></div>
            </div>
          </div>

          <aside class="about__langs reveal reveal-delay-3">
            <h3 class="about__langs-title">Languages</h3>
            <ul class="about__langs-list" id="languages-list"></ul>
            <p class="about__location" id="about-location">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
              </svg>
              <span id="location-text">Your City, Country</span>
            </p>
          </aside>
        </div>

        <div class="about__stats reveal" id="about-stats"></div>
      </div>
    </section>

    <hr class="divider">

    <section class="section projects" id="projects">
      <div class="container">
        <h2 class="section-title reveal">Things I've built</h2>
        <div id="projects-list"></div>
      </div>
    </section>

    <hr class="divider">

    <section class="section contact" id="contact">
      <div class="container">
        <h2 class="section-title reveal" id="contact-title"></h2>
        <p class="contact__text reveal reveal-delay-2" id="contact-text"></p>
        <a class="contact__email reveal reveal-delay-3" id="contact-email" href="mailto:you@example.com">
          you@example.com
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </a>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <p class="footer__copy">
        &copy; <span id="year"></span> <span id="footer-name">Your Name</span> · <span id="footer-location">Your City</span> · <span class="footer__flag" title="Originally from Morocco">🇲🇦</span>
      </p>
      <nav class="footer__social" id="footer-social" aria-label="Social links"></nav>
    </div>
  </footer>

  <button class="back-to-top" id="back-to-top" aria-label="Back to top">↑</button>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
